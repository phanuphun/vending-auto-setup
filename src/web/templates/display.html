{% extends "base.html" %}
{% set title = "Display" %}

{% block content %}
<section class="display-tool" data-default-display="{{ default_display }}">
  <div class="display-header">
    <h2>Monitor Setting</h2>
    <button class="primary-action" id="applyDisplay" type="button">Apply</button>
  </div>

  <div class="display-layout">
    <div class="monitor-workspace">
      <div class="monitor-frame">
        <div class="monitor-preview" id="monitorPreview" data-rotation="normal">
          <div class="corner top-left"></div>
          <div class="corner top-right"></div>
          <div class="corner bottom-left"></div>
          <div class="corner bottom-right"></div>
          <div class="preview-label" id="previewLabel">Normal</div>
        </div>
      </div>

      <div class="rotation-controls" role="group" aria-label="Rotation">
        {% for value, label in rotations %}
        <button class="rotation-button {{ 'selected' if value == 'normal' else '' }}" type="button" data-rotation="{{ value }}">{{ label }}</button>
        {% endfor %}
      </div>
    </div>

    <aside class="display-options">
      <label for="displayOutput">Display</label>
      <select id="displayOutput">
        {% for output in outputs %}
        <option value="{{ output }}">{{ output }}</option>
        {% endfor %}
      </select>

      <label for="touchDevice">Touchscreen</label>
      <select id="touchDevice">
        {% for touch in touch_devices %}
        <option value="{{ touch }}">{{ touch }}</option>
        {% endfor %}
      </select>

      <label for="xDisplay">X display server</label>
      <div class="inline-control">
        <input id="xDisplay" value="{{ default_display }}" autocomplete="off">
        <button id="refreshDevices" type="button">Refresh</button>
      </div>
      <p class="field-hint">Usually :0. Display output is the monitor name from xrandr.</p>

      <label class="check-row">
        <input id="persistSession" type="checkbox" checked>
        Persist at login
      </label>

      <label class="check-row">
        <input id="persistXorg" type="checkbox">
        Persist touch in Xorg
      </label>
    </aside>
  </div>

  <div class="command-preview">
    <h3>Command Preview</h3>
    <ul class="command-list" id="commandPreviewList"></ul>
  </div>

  <div class="apply-result" id="applyResult" aria-live="polite"></div>
</section>

<script>
const rotationLabels = {
  normal: "Normal",
  left: "Left",
  right: "Right",
  inverted: "Revert",
};

const rotationDegrees = {
  normal: "0deg",
  left: "-90deg",
  right: "90deg",
  inverted: "180deg",
};

const preview = document.getElementById("monitorPreview");
const previewLabel = document.getElementById("previewLabel");
const commandPreviewList = document.getElementById("commandPreviewList");
const applyResult = document.getElementById("applyResult");
const outputSelect = document.getElementById("displayOutput");
const touchSelect = document.getElementById("touchDevice");
const xDisplayInput = document.getElementById("xDisplay");
const persistSessionInput = document.getElementById("persistSession");
const persistXorgInput = document.getElementById("persistXorg");
let selectedRotation = "normal";

function shellQuote(value) {
  return "'" + String(value).replaceAll("'", "'\"'\"'") + "'";
}

function selectedConfig() {
  return {
    output: outputSelect.value,
    touch: touchSelect.value,
    rotate: selectedRotation,
    display: xDisplayInput.value.trim(),
    persistSession: persistSessionInput.checked,
    persistXorg: persistXorgInput.checked,
  };
}

function replaceOptions(select, values) {
  const currentValue = select.value;
  select.innerHTML = "";
  values.forEach((value) => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
  if (values.includes(currentValue)) {
    select.value = currentValue;
  }
}

function commandItem(label, command, requiresRoot) {
  const item = document.createElement("li");
  const header = document.createElement("div");
  const title = document.createElement("strong");
  title.textContent = label;
  header.appendChild(title);
  if (requiresRoot) {
    const badge = document.createElement("span");
    badge.className = "badge warn";
    badge.textContent = "sudo";
    header.appendChild(badge);
  }
  const code = document.createElement("code");
  code.textContent = command;
  item.appendChild(header);
  item.appendChild(code);
  return item;
}

function updatePreview() {
  const config = selectedConfig();
  preview.style.transform = `rotate(${rotationDegrees[config.rotate]})`;
  preview.dataset.rotation = config.rotate;
  previewLabel.textContent = rotationLabels[config.rotate];

  commandPreviewList.innerHTML = "";
  if (!config.output || !config.touch) {
    commandPreviewList.appendChild(commandItem("Select devices", "Select display output and touchscreen first.", false));
    return;
  }

  const displayArg = config.display ? ` --display ${shellQuote(config.display)}` : "";
  const applyCommand = `vas display apply${displayArg} --output ${shellQuote(config.output)} --touch ${shellQuote(config.touch)} --rotate ${config.rotate}`;
  commandPreviewList.appendChild(commandItem("Apply runtime", applyCommand, false));
  if (config.persistSession) {
    const persistSession = `vas display persist-session${displayArg} --output ${shellQuote(config.output)} --touch ${shellQuote(config.touch)} --rotate ${config.rotate}`;
    commandPreviewList.appendChild(commandItem("Persist at login", persistSession, false));
  }
  if (config.persistXorg) {
    const persistXorg = `sudo vas display persist-xorg --touch ${shellQuote(config.touch)} --rotate ${config.rotate}`;
    commandPreviewList.appendChild(commandItem("Persist touch in Xorg", persistXorg, true));
  }
}

async function refreshDevices() {
  applyResult.textContent = "Refreshing devices...";
  const params = new URLSearchParams({ display: xDisplayInput.value.trim() || ":0" });
  const response = await fetch(`{{ url_for('display_devices') }}?${params.toString()}`);
  const result = await response.json();
  replaceOptions(outputSelect, result.outputs || []);
  replaceOptions(touchSelect, result.touchDevices || []);
  applyResult.textContent = "";
  updatePreview();
}

document.querySelectorAll(".rotation-button").forEach((button) => {
  button.addEventListener("click", () => {
    selectedRotation = button.dataset.rotation;
    document.querySelectorAll(".rotation-button").forEach((item) => item.classList.remove("selected"));
    button.classList.add("selected");
    applyResult.textContent = "";
    updatePreview();
  });
});

[outputSelect, touchSelect, xDisplayInput, persistSessionInput, persistXorgInput].forEach((control) => {
  control.addEventListener("change", updatePreview);
  control.addEventListener("input", updatePreview);
});

document.getElementById("refreshDevices").addEventListener("click", refreshDevices);
xDisplayInput.addEventListener("change", refreshDevices);

document.getElementById("applyDisplay").addEventListener("click", async () => {
  applyResult.textContent = "Applying...";
  applyResult.className = "apply-result";
  const response = await fetch("{{ url_for('display_apply') }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(selectedConfig()),
  });
  const result = await response.json();
  if (!response.ok) {
    applyResult.className = "apply-result error";
    applyResult.textContent = (result.errors || ["Apply failed."]).join(" ");
    return;
  }
  applyResult.className = "apply-result success";
  applyResult.textContent = "Applied.";
});

updatePreview();
</script>
{% endblock %}
